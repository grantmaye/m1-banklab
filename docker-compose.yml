services:
  postgres:
    image: postgres:16-alpine
    container_name: m1-banklab-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-m1_banklab}
      POSTGRES_USER: ${POSTGRES_USER:-m1_banklab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-m1_banklab}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - m1-banklab-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  m1-banklab-postgres:
